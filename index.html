<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <script>
    (function () {
      var h = location.hostname;
      var p = location.port;
      var local = h === "localhost" || h === "127.0.0.1" || h === "[::1]" || p === "8765";
      if (!local || !navigator.serviceWorker) return;
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) { r.unregister(); });
      });
    })();
  </script>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1115" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Time Log</title>
  <link rel="stylesheet" href="styles.css?v=128" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="apple-touch-icon" href="icon.svg" />
</head>
<body>
  <div class="tabs" role="tablist">
    <button type="button" class="active" data-tab="log">Log</button>
    <button type="button" data-tab="timeline">Timeline</button>
    <button type="button" data-tab="report">Report</button>
  </div>

  <section data-panel="log">
    <div class="card">
      <label for="quickPlace" style="margin-top:0;">Place</label>
      <input type="text" id="quickPlace" autocomplete="off" />
      <label for="quickActivity" style="margin-top:10px;">Activity</label>
      <input type="text" id="quickActivity" list="activitySuggest" autocomplete="off" />
      <datalist id="activitySuggest"></datalist>
      <label for="quickPeople" style="margin-top:10px;">With</label>
      <input type="text" id="quickPeople" autocomplete="off" />
      <label for="quickRemark" style="margin-top:10px;">Remark</label>
      <textarea id="quickRemark"></textarea>
      <button type="button" class="primary" id="btnLogNow" style="margin-top:12px;width:100%;">Log Now</button>
    </div>
    <div class="card">
      <label for="manualPlace" style="margin-top:0;">Place</label>
      <input type="text" id="manualPlace" autocomplete="off" />
      <label for="manualActivity" style="margin-top:10px;">Activity</label>
      <input type="text" id="manualActivity" list="activitySuggest" autocomplete="off" />
      <details class="pick-details" id="manualDateDetails">
        <summary class="pick-summary" id="manualDateSummary"></summary>
        <input type="hidden" id="manualDateSelected" value="" />
        <div id="manualDateWrap" class="picker-chip-stack" role="group" aria-label="Pick date"></div>
      </details>
      <details class="pick-details" id="manualTimeDetails" style="margin-top:10px;">
        <summary class="pick-summary" id="manualTimeSummary"></summary>
        <div class="row manual-time-row manual-wheel-row">
          <div class="manual-wheel-col">
            <div class="manual-wheel-caption">Hour</div>
            <div class="manual-wheel-shell">
              <div class="manual-wheel-viewport" id="manualHourWheelViewport" tabindex="0" role="listbox" aria-label="Hour 0-23">
                <div class="manual-wheel-list" id="manualHourWheelList"></div>
              </div>
            </div>
          </div>
          <div class="manual-wheel-col">
            <div class="manual-wheel-caption">Minute</div>
            <div class="manual-wheel-shell">
              <div class="manual-wheel-viewport" id="manualMinuteWheelViewport" tabindex="0" role="listbox" aria-label="Minute 0-59">
                <div class="manual-wheel-list" id="manualMinuteWheelList"></div>
              </div>
            </div>
          </div>
        </div>
      </details>
      <input type="hidden" id="manualHourSel" value="" />
      <input type="hidden" id="manualMinuteSel" value="" />
      <label for="manualPeople" style="margin-top:10px;">With</label>
      <input type="text" id="manualPeople" autocomplete="off" />
      <label for="manualRemark" style="margin-top:10px;">Remark</label>
      <textarea id="manualRemark"></textarea>
      <button type="button" class="primary" id="btnManual" style="margin-top:12px;width:100%;">Add Record</button>
    </div>
    <div class="card hidden" id="mappingApprovalCard">
      <h3 style="margin:0 0 8px;">Classification</h3>
      <p class="muted" id="mappingApprovalMeta" style="margin:0 0 10px;"></p>
      <div id="mappingApprovalList"></div>
      <div class="row" style="margin-top:10px;">
        <button type="button" class="ghost" id="btnMappingCancel">Cancel</button>
      </div>
    </div>
  </section>

  <section data-panel="timeline" class="hidden">
    <div class="card timeline-toolbar-card">
      <div class="timeline-toolbar">
        <label for="timelinePickDate">Date</label>
        <input type="date" id="timelinePickDate" class="input-xl" aria-label="Timeline date" />
      </div>
    </div>
    <div class="card timeline-cal-card">
      <p id="timelineNowStatus" class="timeline-now-status muted"></p>
      <div id="timelineCalendar" class="timeline-cal"></div>
      <p id="timelineEmpty" class="muted" style="padding:14px;margin:0;">No records in the last 3 days.</p>
    </div>
  </section>


  <section data-panel="report" class="hidden report-panel">
    <div class="card report-range-toolbar">
      <div class="report-range-row">
        <div class="report-range-dates" role="group" aria-label="Date Range">
          <input type="date" id="reportFromStr" class="input-xl" aria-label="Range Start" />
          <span class="report-range-sep" aria-hidden="true">～</span>
          <input type="date" id="reportToStr" class="input-xl" aria-label="Range End" />
        </div>
        <div class="report-range-field-preset">
          <select id="reportPeriodPreset" class="input-xl" aria-label="Period Preset">
            <option value="custom">Custom</option>
            <option value="cmp_years">3 Years</option>
            <option value="cmp_quarters">3 Quarters</option>
            <option value="cmp_months">3 Months</option>
            <option value="cmp_weeks">3 Weeks</option>
          </select>
        </div>
      </div>
    </div>
    <div class="report-layout">
      <aside class="report-sidebar card">
        <input
          type="text"
          id="reportKeywordSearch"
          class="input-xl report-search-field"
          placeholder="Search"
          readonly
          autocomplete="off"
          aria-label="Search"
          inputmode="search"
          style="margin-top:0;"
        />
        <label style="margin-top:14px;">Group</label>
        <div id="reportFilterGroupBox" class="report-ms-box" role="group" aria-label="Group Filter"></div>
        <label style="margin-top:14px;">Layers</label>
        <div id="reportFilterLayerBox" class="report-ms-box" role="group" aria-label="Layers Filter"></div>
        <label style="margin-top:14px;">Category</label>
        <div id="reportFilterCatBox" class="report-ms-box" role="group" aria-label="Category Filter"></div>
        <label style="margin-top:14px;">Sub Category</label>
        <div id="reportFilterSubBox" class="report-ms-box" role="group" aria-label="Sub Category Filter"></div>
        <label style="margin-top:14px;">Project</label>
        <div id="reportFilterProjectBox" class="report-ms-box" role="group" aria-label="Project Filter"></div>
        <label style="margin-top:14px;">Activity</label>
        <div id="reportFilterActivityBox" class="report-ms-box" role="group" aria-label="Activity filter"></div>
        <label for="reportPeopleSearch" style="margin-top:10px;">With</label>
        <input type="text" id="reportPeopleSearch" class="input-xl" autocomplete="off" aria-label="With" />
      </aside>
      <div class="report-main">
        <div class="card report-main-stack">
          <div class="report-main-header report-main-header--actions-only">
            <div class="report-main-header-actions">
              <button type="button" class="report-export-btn" id="btnReportExport" aria-label="Export Data CSV">Export</button>
              <div class="report-unit-toggle" id="reportUnitToggle" role="group" aria-label="Display Units">
                <button type="button" class="report-unit-btn active" data-unit="hours">Hours</button>
                <button type="button" class="report-unit-btn" data-unit="pct">%</button>
              </div>
            </div>
          </div>
          <div class="report-results" id="reportSummary"></div>
        </div>
      </div>
    </div>
  </section>

  <div id="toast" class="toast" role="status"></div>

  <script src="app.js?v=128"></script>
</body>
</html>
